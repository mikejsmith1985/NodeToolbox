# .github/workflows/ci.yml — Continuous Integration for NodeToolbox.
#
# Runs on every pull request to main and every push to main.
# Installs dependencies, runs the full test suite, and reports results.
# A failing CI run blocks merging, ensuring main is always green.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ '18.x', '20.x' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Upload coverage (optional)
        if: matrix.node-version == '20.x'
        run: npm test -- --coverage --coverageReporters=text-summary
        continue-on-error: true
