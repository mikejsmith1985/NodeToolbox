# .github/workflows/release.yml — Release pipeline for NodeToolbox.
#
# Triggered by pushing a version tag (e.g., v1.2.3).
# Runs the full test suite, creates the Windows launcher, packages the
# distributable zip, and uploads it to a new GitHub Release.
#
# Usage:
#   git tag v1.2.3 && git push origin v1.2.3

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build and Publish Release
    runs-on: windows-latest

    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Package distributable zip
        run: powershell -ExecutionPolicy Bypass -File scripts\local-release.ps1
        # Produces dist/nodetoolbox-vX.Y.Z.zip

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NodeToolbox ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/nodetoolbox-${{ steps.get_version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
